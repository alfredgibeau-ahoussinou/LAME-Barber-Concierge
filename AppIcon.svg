<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Fond noir -->
  <rect width="1024" height="1024" fill="#0C0C0C" rx="230"/>

  <!-- Anneau extérieur doré -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#B8963E" stroke-width="1.5" opacity="0.3"/>

  <!-- Anneau intérieur doré -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#B8963E" stroke-width="0.8" opacity="0.15"/>

  <!-- Lame de rasoir stylisée — forme principale -->
  <!-- Corps de la lame -->
  <path d="M 340 300 L 560 280 Q 620 290 640 340 L 680 520 Q 685 560 660 580 L 480 620 Q 440 625 420 600 L 320 400 Q 305 360 340 300 Z"
        fill="#1A1508" stroke="#B8963E" stroke-width="1.5"/>

  <!-- Tranchant de la lame (bord brillant) -->
  <path d="M 340 300 L 560 280 Q 620 290 640 340 L 680 520"
        fill="none" stroke="#D4AF5A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Reflet sur la lame -->
  <path d="M 380 340 L 560 322 Q 600 330 615 358 L 640 440"
        fill="none" stroke="#E8C870" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- Vis de la lame -->
  <circle cx="490" cy="450" r="22" fill="#0C0C0C" stroke="#B8963E" stroke-width="1.5"/>
  <circle cx="490" cy="450" r="8" fill="#B8963E" opacity="0.6"/>

  <!-- Fente de la vis (croix) -->
  <line x1="490" y1="438" x2="490" y2="462" stroke="#0C0C0C" stroke-width="2.5"/>
  <line x1="478" y1="450" x2="502" y2="450" stroke="#0C0C0C" stroke-width="2.5"/>

  <!-- Manche élégant -->
  <rect x="300" y="540" width="200" height="48" rx="10"
        fill="#1A1508" stroke="#B8963E" stroke-width="1.2"/>
  <!-- Détails manche -->
  <rect x="316" y="552" width="24" height="24" rx="4"
        fill="none" stroke="#B8963E" stroke-width="0.8" opacity="0.5"/>
  <rect x="348" y="556" width="140" height="2" rx="1"
        fill="#B8963E" opacity="0.3"/>
  <rect x="348" y="564" width="100" height="2" rx="1"
        fill="#B8963E" opacity="0.2"/>

  <!-- Texte LAME -->
  <text x="512" y="750"
        font-family="Georgia, serif"
        font-size="110"
        font-weight="300"
        letter-spacing="28"
        text-anchor="middle"
        fill="#B8963E">LAME</text>

  <!-- Sous-titre -->
  <text x="512" y="800"
        font-family="Arial, sans-serif"
        font-size="28"
        font-weight="400"
        letter-spacing="10"
        text-anchor="middle"
        fill="#B8963E"
        opacity="0.45">BARBER CONCIERGE</text>

  <!-- Étoile décorative ✦ -->
  <text x="512" y="250"
        font-size="36"
        text-anchor="middle"
        fill="#B8963E"
        opacity="0.5">✦</text>
</svg>
